services:
  - type: web
    name: streamlit-monitor
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
